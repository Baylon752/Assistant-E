<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elikia Assist — Assistant IA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f9;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1rem;
  }

  #cdc-widget {
    width: 400px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(26,60,110,0.15);
    overflow: hidden;
    display: flex; flex-direction: column;
    font-size: 14px;
  }

  /* ── Header ── */
  #cdc-header {
    background: linear-gradient(135deg, #1A3C6E 0%, #1e4d8c 100%);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .cdc-logo {
    width: 44px; height: 44px; border-radius: 10px;
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px; color: #1A3C6E;
    letter-spacing: 1px; flex-shrink: 0;
  }
  .cdc-header-info .name { color: #fff; font-weight: 600; font-size: 15px; }
  .cdc-header-info .sub { color: rgba(255,255,255,0.65); font-size: 11px; margin-top: 2px; }
  .cdc-header-info .status {
    color: rgba(255,255,255,0.85); font-size: 11px;
    display: flex; align-items: center; gap: 5px; margin-top: 4px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #5ED49A; display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── Messages ── */
  #cdc-messages {
    flex: 1; padding: 14px 12px;
    min-height: 320px; max-height: 360px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
    background: #f7f9fc;
  }
  #cdc-messages::-webkit-scrollbar { width: 4px; }
  #cdc-messages::-webkit-scrollbar-thumb { background: #c5cfe0; border-radius: 4px; }

  .cdc-msg { display: flex; gap: 8px; align-items: flex-end; }
  .cdc-msg.bot { flex-direction: row; }
  .cdc-msg.user { flex-direction: row-reverse; }

  .cdc-avatar {
    width: 30px; height: 30px; border-radius: 7px;
    background: #1A3C6E; color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; flex-shrink: 0;
  }

  .cdc-bubble-wrap { display: flex; flex-direction: column; max-width: 78%; }
  .cdc-msg.user .cdc-bubble-wrap { align-items: flex-end; }

  .cdc-bubble {
    padding: 9px 13px; border-radius: 14px;
    font-size: 13px; line-height: 1.55;
  }
  .cdc-msg.bot .cdc-bubble {
    background: #ffffff;
    color: #1a2a3a;
    border: 1px solid #e0e8f0;
    border-bottom-left-radius: 4px;
  }
  .cdc-msg.user .cdc-bubble {
    background: #1A3C6E; color: white;
    border-bottom-right-radius: 4px;
  }
  .cdc-time { font-size: 10px; color: #9aabb8; margin-top: 3px; }
  .cdc-msg.user .cdc-time { text-align: right; }

  /* ── Typing ── */
  .typing-dots span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #9aabb8; margin: 0 1.5px;
    animation: tdot 1.2s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:.2s}
  .typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  /* ── AI badge ── */
  .ai-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    background: #e8f0fb; color: #1A3C6E;
    border-radius: 20px; padding: 2px 8px; margin-bottom: 4px;
  }

  /* ── Quick replies ── */
  #cdc-quick {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 12px 6px;
    background: #f7f9fc;
    border-top: 1px solid #e8eef5;
  }
  .cdc-qr {
    background: #fff; border: 1px solid #1A3C6E;
    color: #1A3C6E; border-radius: 20px;
    font-size: 12px; padding: 5px 12px;
    cursor: pointer; transition: all .15s;
  }
  .cdc-qr:hover { background: #1A3C6E; color: #fff; }

  /* ── Input ── */
  #cdc-input-row {
    display: flex; gap: 8px; padding: 10px 12px 12px;
    background: #fff; border-top: 1px solid #e8eef5;
  }
  #cdc-input {
    flex: 1; border-radius: 22px;
    border: 1.5px solid #dce6f0;
    padding: 9px 15px; font-size: 13px;
    outline: none; color: #1a2a3a;
    transition: border-color .2s;
  }
  #cdc-input:focus { border-color: #1A3C6E; }
  #cdc-send {
    background: #1A3C6E; color: white; border: none;
    border-radius: 50%; width: 40px; height: 40px;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  #cdc-send:hover { background: #142f58; }
  #cdc-send:active { transform: scale(.95); }

  #cdc-footer {
    text-align: center; font-size: 10px; color: #9aabb8;
    padding: 0 12px 10px; background: #fff;
  }

  /* ── AI thinking indicator ── */
  #ai-status {
    font-size: 11px; color: #1A3C6E;
    padding: 4px 12px; background: #eef3fb;
    display: none; align-items: center; gap: 6px;
  }
  #ai-status.visible { display: flex; }
  .ai-spin {
    width: 12px; height: 12px; border: 2px solid #c5d4f0;
    border-top-color: #1A3C6E; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="cdc-widget">

  <div id="cdc-header">
    <div class="cdc-logo">CDC</div>
    <div class="cdc-header-info">
      <div class="name">CDC Assist</div>
      <div class="sub">Banque Congolaise Universelle</div>
      <div class="status"><span class="live-dot"></span> En ligne · Propulsé par IA</div>
    </div>
  </div>

  <div id="ai-status">
    <div class="ai-spin"></div>
    <span>CDC Assist réfléchit…</span>
  </div>

  <div id="cdc-messages"></div>

  <div id="cdc-quick">
    <button class="cdc-qr" onclick="qr('Nos services bancaires')">🏦 Nos services</button>
    <button class="cdc-qr" onclick="qr('Ouvrir un compte')">💳 Ouvrir un compte</button>
    <button class="cdc-qr" onclick="qr('Demander un crédit')">💰 Crédit</button>
    <button class="cdc-qr" onclick="qr('Candidature emploi')">💼 Emploi</button>
    <button class="cdc-qr" onclick="qr('Nous contacter')">📞 Contact</button>
    <button class="cdc-qr" onclick="qr('Horaires et adresses')">📍 Agences</button>
  </div>

  <div id="cdc-input-row">
    <input id="cdc-input" type="text" placeholder="Posez votre question à CDC Assist…"
      onkeydown="if(event.key==='Enter')send()" />
    <button id="cdc-send" onclick="send()" aria-label="Envoyer">&#10148;</button>
  </div>
  <div id="cdc-footer">CDC Assist · IA · Informations non contractuelles</div>

</div>

<script>
/* ── Configuration CDC ── */
const CDC_CONFIG = {
  name: "CDC Banque",
  fullName: "Caisse de Dépôts et Consignations",
  email: "baylonalingou@gmail.com",
  tel: "050 638 431",
  secteur: "Banque et Finance",
  taille: "51–200 employés",
  agences: [
    { ville: "Brazzaville", adresse: "Brazzaville, République du Congo" },
    { ville: "Pointe-Noire", adresse: "Pointe-Noire, République du Congo" }
  ],
  horaires: "À préciser — contactez-nous pour connaître nos horaires"
};

const SYSTEM_PROMPT = `Tu es CDC Assist, l'assistant IA officiel de CDC Banque (${CDC_CONFIG.fullName}), une banque congolaise universelle.

INFORMATIONS DE CONTACT :
- Email : ${CDC_CONFIG.email}
- Téléphone : ${CDC_CONFIG.tel}
- Agences : Brazzaville ET Pointe-Noire, République du Congo (deux agences)
- Horaires : Non communiqués pour l'instant. Si quelqu'un demande les horaires, indique qu'il peut nous contacter directement pour les connaître
- Secteur : ${CDC_CONFIG.secteur}
- Taille : ${CDC_CONFIG.taille}

TES RÈGLES :
1. Réponds TOUJOURS en français, de façon professionnelle, chaleureuse et concise.
2. Tu représentes CDC Banque — une banque universelle de confiance au Congo.
3. Pour les demandes de candidature ou de contact, fournis toujours l'email ${CDC_CONFIG.email} et le téléphone ${CDC_CONFIG.tel}.
4. Pour les questions sur les produits bancaires spécifiques (taux, montants exacts), indique que le client doit contacter l'agence directement.
5. Ne fournis jamais d'informations financières personnelles ou contractuelles précises.
6. Utilise des émojis avec modération pour rendre les réponses plus lisibles.
7. Garde tes réponses courtes : maximum 5-6 lignes.
8. Si tu ne sais pas, oriente vers l'email ou le téléphone.`;

/* ── État ── */
let history = [];
let isWaiting = false;

/* ── Utils ── */
function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function addMsg(html, isUser, isAI = false) {
  const box = document.getElementById('cdc-messages');
  const wrap = document.createElement('div');
  wrap.className = 'cdc-msg ' + (isUser ? 'user' : 'bot');
  const t = getTime();
  if (!isUser) {
    wrap.innerHTML = `
      <div class="cdc-avatar">CDC</div>
      <div class="cdc-bubble-wrap">
        ${isAI ? '<span class="ai-badge">✨ IA</span>' : ''}
        <div class="cdc-bubble">${html.replace(/\n/g,'<br>')}</div>
        <div class="cdc-time">${t}</div>
      </div>`;
  } else {
    wrap.innerHTML = `
      <div class="cdc-bubble-wrap">
        <div class="cdc-bubble">${html}</div>
        <div class="cdc-time">${t}</div>
      </div>`;
  }
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('cdc-messages');
  const t = document.createElement('div');
  t.className = 'cdc-msg bot'; t.id = 'cdc-typ';
  t.innerHTML = `<div class="cdc-avatar">CDC</div><div class="cdc-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  box.appendChild(t); box.scrollTop = box.scrollHeight;
}
function hideTyping() { const t=document.getElementById('cdc-typ'); if(t)t.remove(); }

function setAIStatus(on) {
  document.getElementById('ai-status').classList.toggle('visible', on);
}

/* ── Appel API Claude ── */
async function callClaude(userMsg) {
  history.push({ role: "user", content: userMsg });

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: history
    })
  });

  const data = await resp.json();
  const reply = data.content?.[0]?.text || "Je rencontre une difficulté technique. Veuillez nous contacter directement au " + CDC_CONFIG.tel;
  history.push({ role: "assistant", content: reply });
  return reply;
}

/* ── Envoi message ── */
async function send() {
  if (isWaiting) return;
  const inp = document.getElementById('cdc-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  isWaiting = true;

  addMsg(text, true);
  showTyping();
  setAIStatus(true);

  try {
    const reply = await callClaude(text);
    hideTyping();
    setAIStatus(false);
    addMsg(reply, false, true);
  } catch (e) {
    hideTyping();
    setAIStatus(false);
    addMsg(`Une erreur s'est produite. Contactez-nous directement :\n📧 ${CDC_CONFIG.email}\n📞 ${CDC_CONFIG.tel}`, false);
  }

  isWaiting = false;
}

function qr(text) {
  document.getElementById('cdc-input').value = text;
  send();
}

/* ── Message de bienvenue ── */
setTimeout(() => {
  addMsg(`Bonjour ! 👋 Bienvenue sur <strong>CDC Assist</strong>, votre assistant IA de la <strong>Caisse de Dépôts et Consignations</strong>.\n\nJe suis disponible pour répondre à toutes vos questions bancaires. Comment puis-je vous aider aujourd'hui ?`, false, false);
}, 500);
</script>
</body>
</html>
